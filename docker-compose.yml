version: "3.8"

services:
  db:
    image: postgres:15
    container_name: logistics_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trade_db
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: logistics_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: logistics_backend
    volumes:
      - ./backend/app:/app
      - ./sample_docs:/data/uploads
      - ./backend/app/hsdata:/app/hsdata
      - ./backend/models:/app/models
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/trade_db
      - REDIS_URL=redis://redis:6379/0
      - HS_CSV=/app/hsdata/hs_codes.csv
      - UPLOAD_DIR=/data/uploads
      - LEDGER_FILE=/app/models/ledger.txt
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: logistics_frontend
    ports:
      - "5173:5173"  # Vite default port
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
