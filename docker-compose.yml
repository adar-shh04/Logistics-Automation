version: "3.8"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trade_db
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    volumes:
      - ./backend/app:/app
      - ./sample_docs:/data/uploads
      - ./backend/app/hsdata:/app/hsdata
      - ./backend/models:/app/models
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/trade_db
      - HS_CSV=/app/hsdata/hs_codes.csv
      - UPLOAD_DIR=/data/uploads
      - LEDGER_FILE=/app/models/ledger.txt
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data:
